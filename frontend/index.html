<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Merit Nook – Premium live coaching platform for students, teachers and parents." />
    <meta name="theme-color" content="#F4F8F4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#111417" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <title>Merit Nook – Smart Learning Platform</title>
    <script>
      // Apply theme instantly before React hydrates to avoid white flash
      (function(){
        try {
          var t = localStorage.getItem('meritnook-theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t);
          document.documentElement.style.background = t === 'dark' ? '#111417' : '#F4F8F4';
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
          document.documentElement.style.background = '#111417';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
